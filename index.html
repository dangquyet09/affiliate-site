<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tạo Link Shopee - Săn Deal Ngon</title>

<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1f1f2e, #0f0f1a);
    color: #fff;
}

.header {
    text-align: center;
    padding: 30px 10px 10px;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg,#ff4d2d,#ff8a65);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.container {
    max-width: 520px;
    margin: 40px auto;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

.input-box input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.08);
    color: white;
}

.btn-main {
    width: 100%;
    margin-top: 15px;
    padding: 16px;
    background: linear-gradient(135deg,#ff4d2d,#ff8a65);
    border: none;
    border-radius: 14px;
    color: white;
    cursor: pointer;
}

.card {
    margin-top: 15px;
    padding: 15px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
}

.copy-btn {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: #ff4d2d;
    color: white;
    cursor: pointer;
}

.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #111;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="header">🔗 Tạo Link Shopee</div>

<div class="container">
    <div class="input-box">
        <input type="text" id="linkInput" placeholder="Dán link Shopee vào đây...">
    </div>

    <button class="btn-main" onclick="taoLink()">Tạo Link Ngay</button>

    <div id="resultBox"></div>
</div>

<div id="toast" class="toast"></div>

<script>
let mainLink = "";

function buildAff(link, sub) {
    return "https://s.shopee.vn/an_redir?origin_link="
        + encodeURIComponent(link)
        + "&affiliate_id=17310760448&sub_id=" + sub;
}

function taoLink() {
    let link = document.getElementById("linkInput").value.trim();

    if (!link.includes("shopee.vn")) {
        showToast("Link không hợp lệ!");
        return;
    }

    document.getElementById("resultBox").innerHTML = `
        <div class="card">⏳ Đang săn mã tốt nhất...</div>
    `;

    setTimeout(() => {
        let aff = buildAff(link, "dealhot_22");
        mainLink = aff;

        document.getElementById("resultBox").innerHTML = `
            <div class="card">
                <b>🔥 Mã 22% tối đa 300K</b><br>
                <span style="color:#f87171">Còn 3 mã cuối hôm nay</span>
                <div style="font-size:12px;margin:8px 0">${aff}</div>
                <button class="copy-btn" onclick="copy('${aff}')">Copy</button>
            </div>
        `;

        navigator.clipboard.writeText(aff);

        setTimeout(() => {
            window.open(aff, "_blank");
        }, 800);

        showToast("🔥 Đã áp mã tốt nhất! Đang chuyển...");
    }, 1000);
}

function copy(text) {
    navigator.clipboard.writeText(text);
    showToast("Đã copy!");
}

function showToast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(() => t.classList.remove("show"), 2000);
}
</script>

</body>
</html>
